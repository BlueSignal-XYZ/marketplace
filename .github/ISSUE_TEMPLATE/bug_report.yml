name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug", "triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Application Mode
      description: Which mode is affected?
      options:
        - Marketplace (waterquality.trading)
        - Cloud (cloud.bluesignal.xyz)
        - Landing (bluesignal.xyz)
        - All
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser & OS
      description: e.g. Chrome 120 on macOS 14
      placeholder: Chrome 120, macOS 14
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, drag and drop screenshots here.
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other relevant information.
