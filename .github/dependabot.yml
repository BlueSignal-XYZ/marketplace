version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: 'development'
      production-dependencies:
        dependency-type: 'production'
    labels:
      - 'dependencies'

  - package-ecosystem: 'npm'
    directory: '/functions'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: 'eslint'
        versions: ['>=10']
      - dependency-name: 'node-fetch'
        versions: ['>=3']
      - dependency-name: 'firebase-functions'
        versions: ['>=7']
    labels:
      - 'dependencies'
      - 'functions'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    labels:
      - 'dependencies'
      - 'ci'
