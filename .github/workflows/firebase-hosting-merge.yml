# Firebase + Cloudflare Deployment Pipeline
# Automatically deploys to Firebase Hosting and triggers Cloudflare builds on merge to master

name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - master

env:
  NODE_VERSION: '22'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --force

      - name: Lint
        # TODO: Remove continue-on-error once existing lint issues are resolved
        continue-on-error: true
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test:ci

      - name: Build all sites
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_ALCHEMY_API_KEY: ${{ secrets.VITE_ALCHEMY_API_KEY }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_LIVEPEER_API_KEY: ${{ secrets.VITE_LIVEPEER_API_KEY }}
        run: npm run build

      # Write service account key for Firebase CLI authentication
      - name: Setup Firebase authentication
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_WATERQUALITY_TRADING }}' > "$RUNNER_TEMP/firebase-sa.json"

      # Deploy Cloud Functions
      # Only deploy the 6 functions that DON'T reference secrets in runWith().
      # This avoids needing roles/secretmanager.admin IAM permission.
      # The 8 HubSpot/TTN functions (which need Secret Manager) are deployed
      # separately via manual gcloud/firebase CLI with proper IAM.
      # Deployed: app, onUserCreate, onUserDelete, ingestReading,
      #           onReadingCreated, deviceHealthCheck
      # Excluded: hubspotWebhook, ttnWebhook, onCustomerCreated,
      #           onCustomerUpdated, onOrderCreated, onOrderUpdated,
      #           onCommissionCompleted, onDeviceActivated
      - name: Install functions dependencies
        run: cd functions && npm ci

      - name: Deploy Cloud Functions (marketplace core)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
          FUNCTIONS_DISCOVERY_TIMEOUT: 120
        run: |
          MAX_RETRIES=3
          RETRY_DELAY=15

          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "=== Cloud Functions deployment attempt $attempt/$MAX_RETRIES ==="

            if npx firebase-tools deploy \
              --only functions:app,functions:onUserCreate,functions:onUserDelete,functions:ingestReading,functions:onReadingCreated,functions:deviceHealthCheck \
              --project waterquality-trading \
              --non-interactive \
              --force \
              --debug; then
              echo "Cloud Functions deployed successfully on attempt $attempt"
              exit 0
            fi

            if [ $attempt -lt $MAX_RETRIES ]; then
              echo "Deployment failed on attempt $attempt. Retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
              RETRY_DELAY=$((RETRY_DELAY * 2))
            fi
          done

          echo "Cloud Functions deployment failed after $MAX_RETRIES attempts"
          exit 1

      # Deploy ALL hosting targets (wqt + cloud + landing)
      # Note: The previous FirebaseExtended/action-hosting-deploy action only
      # deployed the default site. Using firebase CLI directly ensures all three
      # targets defined in firebase.json are deployed.
      - name: Deploy all hosting targets
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        run: npx firebase-tools deploy --only hosting --project waterquality-trading --non-interactive --force

      - name: Cleanup service account key
        if: always()
        run: rm -f "$RUNNER_TEMP/firebase-sa.json"

  # Trigger Cloudflare builds after Firebase deployment succeeds
  cloudflare_deploy:
    runs-on: ubuntu-latest
    needs: build_and_deploy
    if: ${{ needs.build_and_deploy.result == 'success' }}
    steps:
      - name: Trigger Cloudflare builds
        env:
          HOOK_WQT: ${{ secrets.CLOUDFLARE_DEPLOY_HOOK_WQT }}
          HOOK_CLOUD: ${{ secrets.CLOUDFLARE_DEPLOY_HOOK_CLOUD }}
          HOOK_LANDING: ${{ secrets.CLOUDFLARE_DEPLOY_HOOK_LANDING }}
        run: |
          trigger_hook() {
            local hook_url="$1"
            local site_name="$2"
            local max_retries=4
            local delays=(2 4 8 16)

            if [ -z "$hook_url" ]; then
              echo "Skipping $site_name - no deploy hook configured"
              return 0
            fi

            echo "Hook URL for $site_name: ${hook_url:0:60}..."

            for attempt in $(seq 1 $max_retries); do
              echo "Triggering Cloudflare build for $site_name (attempt $attempt/$max_retries)..."

              response=$(curl -s -w "\n%{http_code}" -X POST "$hook_url")
              HTTP_CODE=$(echo "$response" | tail -n1)
              BODY=$(echo "$response" | sed '$d')

              echo "HTTP Response Code: $HTTP_CODE"

              if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
                echo "Cloudflare build triggered successfully for $site_name"
                echo "Response: $BODY"
                return 0
              fi

              if [ "$HTTP_CODE" = "304" ]; then
                echo "Cloudflare build already queued/in-progress for $site_name (HTTP 304 - Not Modified)"
                return 0
              fi

              echo "Build trigger failed with HTTP $HTTP_CODE"
              echo "Response body: $BODY"

              if [ $attempt -lt $max_retries ]; then
                delay=${delays[$attempt - 1]}
                echo "Retrying in ${delay}s..."
                sleep $delay
              fi
            done

            echo "Failed to trigger Cloudflare build for $site_name after $max_retries attempts"
            return 1
          }

          failed=0

          # Trigger all three sites (with delays to avoid Cloudflare 304 deduplication)
          trigger_hook "$HOOK_WQT" "wqt" || failed=$((failed + 1))
          sleep 5
          trigger_hook "$HOOK_CLOUD" "cloud" || failed=$((failed + 1))
          sleep 5
          trigger_hook "$HOOK_LANDING" "landing" || failed=$((failed + 1))

          if [ $failed -gt 0 ]; then
            echo "$failed Cloudflare deployment(s) failed"
            exit 1
          fi

          echo "All Cloudflare builds triggered successfully!"
