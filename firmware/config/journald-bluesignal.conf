# /etc/systemd/journald.conf.d/bluesignal.conf
# Limit systemd journal to protect SD card write endurance.
# Storage=volatile writes journal to tmpfs (RAM), not SD card.
# Logs are lost on reboot — critical events go to SQLite events table.
# Copy to /etc/systemd/journald.conf.d/bluesignal.conf on the Pi.

[Journal]
SystemMaxUse=50M
SystemMaxFileSize=10M
MaxRetentionSec=7d
Storage=volatile
